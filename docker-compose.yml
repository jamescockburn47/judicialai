services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - ./documents:/app/../documents:ro
    env_file:
      - .env
    environment:
      - RUST_LOG=bs_detector=info,tower_http=info

  frontend:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5175:5175"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_API_URL=http://localhost:8002
    depends_on:
      - backend
